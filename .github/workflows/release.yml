name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dist/*.exe
          - os: ubuntu-latest
            artifact: dist/*.deb
          - os: macos-latest
            artifact: dist/*.dmg   # .app is packaged inside a .dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build        # your compile/bundle step

      - name: Package
        run: npx electron-builder # produces .exe / .deb / .app+.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: ${{ matrix.artifact }}
