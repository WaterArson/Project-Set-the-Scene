name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dist/*.exe
          - os: ubuntu-latest
            artifact: dist/*.deb
          - os: macos-latest
            artifact: dist/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed --name project-set-the-scene src/main.py

      - name: Package .deb (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p deb-pkg/usr/local/bin
          cp dist/project-set-the-scene deb-pkg/usr/local/bin/project-set-the-scene
          mkdir -p deb-pkg/DEBIAN
          printf 'Package: project-set-the-scene\nVersion: 1.0.0\nArchitecture: amd64\nMaintainer: You <you@example.com>\nDescription: Project Set The Scene\n' > deb-pkg/DEBIAN/control
          dpkg-deb --build deb-pkg dist/project-set-the-scene.deb

      - name: Package .dmg (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          create-dmg dist/project-set-the-scene.dmg dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: ${{ matrix.artifact }}
